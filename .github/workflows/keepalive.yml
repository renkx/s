name: Keepalive Workflow

on:
  schedule:
    # 每 30 天的午夜 0 点触发一次（在 60 天限制内保活）
    - cron: '0 0 */30 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Keepalive by Native GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 正在获取当前工作流的精准 ID..."
          
          # 1. 动态获取当前运行实例所对应的真正 Workflow ID
          WORKFLOW_ID=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" --jq '.workflow_id')
          echo "📍 当前工作流 ID 为: $WORKFLOW_ID"
          
          # 2. 调用官方 API 重新激活/启用该工作流
          echo "🚀 正在刷新定时任务状态..."
          gh api -X PUT "/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/enable"
          
          echo "✅ 定时任务已成功激活，60天倒计时已重置！"